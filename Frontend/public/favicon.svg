<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3D8F"/>
      <stop offset="100%" stop-color="#0F2560"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Cricket ball body (white, slightly transparent) -->
  <circle cx="16" cy="16" r="10.5" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>

  <!-- Seam — top arc -->
  <path d="M6.5 13.5 C10 8.5 22 8.5 25.5 13.5"
        fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Seam — bottom arc -->
  <path d="M6.5 18.5 C10 23.5 22 23.5 25.5 18.5"
        fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Vertical quarter-seam -->
  <path d="M16 5.5 C17.6 9 17.6 23 16 26.5"
        fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1" stroke-linecap="round"/>
</svg>
