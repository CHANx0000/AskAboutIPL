<div class="chat-page">
  <!-- Messages -->
  <div class="messages-container">
    @for (message of messages(); track message.id) {
      <div class="message-row" [class.user-row]="message.role === 'user'">

        @if (message.role === 'assistant') {
          <div class="avatar ai-avatar">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="9" r="3.5" fill="white"/>
              <path d="M5 20c0-4 3.1-7 7-7s7 3 7 7" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
            </svg>
          </div>
        }

        <div
          class="message"
          [class.user-message]="message.role === 'user'"
          [class.assistant-message]="message.role === 'assistant'"
        >
          <p class="message-content">{{ message.content }}</p>
          <span class="message-time">{{ message.timestamp | date: 'shortTime' }}</span>
        </div>

      </div>
    }

    @if (isLoading()) {
      <div class="message-row">
        <div class="avatar ai-avatar">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="9" r="3.5" fill="white"/>
            <path d="M5 20c0-4 3.1-7 7-7s7 3 7 7" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="assistant-message typing-bubble">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    }

    <div #messagesEnd></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        [(ngModel)]="inputText"
        (keydown)="onKeydown($event)"
        (input)="autoResize($event)"
        placeholder="Ask anything about IPL…"
        class="chat-input"
        rows="1"
        [disabled]="isLoading()"
      ></textarea>
      <button
        class="send-btn"
        (click)="sendMessage()"
        [disabled]="!inputText.trim() || isLoading()"
        title="Send"
      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">AskAboutIPL may make mistakes. Always verify important stats.</p>
  </div>
</div>
