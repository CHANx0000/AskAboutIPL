<aside class="sidebar">

  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-logo">
      <img src="IPL.png" alt="IPL" class="brand-img" />
    </div>
    <span class="brand-name">AskAboutIPL</span>
    <button class="new-chat-btn" (click)="newChat()" title="New Chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
  </div>

  <!-- Sessions list -->
  <div class="sessions-list">
    <p class="sessions-label">Chats</p>
    @for (session of sessions(); track session.id) {
      <button
        class="session-item"
        [class.active]="session.id === activeId()"
        (click)="switchChat(session.id)"
      >
        <span class="session-title">{{ session.title }}</span>
        <span class="session-date">{{ session.date | date: 'MMM d' }}</span>
      </button>
    }
  </div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <button class="footer-btn" title="Settings (Coming Soon)" disabled>
      <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
      </svg>
      <span>Settings</span>
      <span class="soon-badge">Soon</span>
    </button>
  </div>

</aside>
